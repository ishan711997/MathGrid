<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Multiplication Practice Grid</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f0e17;
    --surface: #1a1929;
    --border: #2e2b4a;
    --accent: #7c6af7;
    --accent2: #f7c948;
    --text: #e8e4ff;
    --muted: #7b789a;
    --correct-bg: #0d2e1a;
    --correct-border: #2ecc71;
    --correct-text: #4fffaa;
    --wrong-bg: #2e0d0d;
    --wrong-border: #e74c3c;
    --wrong-text: #ff6b6b;
    --hdr-bg: #1e1b38;
    --total-bg: #16142b;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Sora', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    padding: 2.5rem 1rem 3rem;
  }

  /* ── SETUP SCREEN ── */
  #setup-screen {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 70vh;
    gap: 2rem;
    text-align: center;
  }

  #setup-screen h1 { font-size: 2rem; font-weight: 700; letter-spacing: -0.03em; }
  #setup-screen h1 span { color: var(--accent); }
  #setup-screen p { font-size: 0.95rem; color: var(--muted); margin-top: 0.4rem; }

  .digit-options {
    display: flex;
    gap: 1rem;
    flex-wrap: wrap;
    justify-content: center;
    margin-top: 0.5rem;
  }

  .digit-btn {
    width: 90px; height: 90px;
    border-radius: 16px;
    border: 2px solid var(--border);
    background: var(--surface);
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 2rem; font-weight: 700;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s, transform 0.15s;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 4px;
  }

  .digit-btn span.sub {
    font-size: 0.6rem;
    font-family: 'Sora', sans-serif;
    color: var(--muted);
    font-weight: 400;
    letter-spacing: 0.04em;
  }

  .digit-btn:hover { border-color: var(--accent); background: #1e1b38; transform: translateY(-3px); }
  .digit-btn.selected { border-color: var(--accent); background: #1e1b38; color: var(--accent); }
  .digit-btn.selected span.sub { color: var(--accent); opacity: 0.7; }

  .start-btn {
    padding: 12px 40px;
    border: 2px solid var(--accent);
    border-radius: 10px;
    background: var(--accent);
    color: #fff;
    font-family: 'Sora', sans-serif;
    font-size: 1rem; font-weight: 600;
    cursor: pointer;
    letter-spacing: 0.04em;
    transition: background 0.2s, transform 0.15s;
    margin-top: 0.5rem;
  }

  .start-btn:hover { background: #6657e0; transform: translateY(-2px); }
  .start-btn:disabled { opacity: 0.3; cursor: default; transform: none; }

  /* ── GRID SCREEN ── */
  #grid-screen { display: none; flex-direction: column; align-items: center; width: 100%; }

  .title-block { text-align: center; margin-bottom: 1.8rem; }
  .title-block h1 { font-size: 1.8rem; font-weight: 700; letter-spacing: -0.03em; }
  .title-block h1 span { color: var(--accent); }
  .title-block p { margin-top: 0.4rem; font-size: 0.82rem; color: var(--muted); }

  .badge {
    display: inline-block; margin-top: 0.5rem;
    padding: 3px 14px; border-radius: 20px;
    background: #1e1b38; border: 1px solid var(--accent);
    color: var(--accent); font-size: 0.75rem;
    font-weight: 600; letter-spacing: 0.06em;
  }

  .legend { display: flex; gap: 1.5rem; justify-content: center; margin-bottom: 1.5rem; flex-wrap: wrap; }
  .leg-item { display: flex; align-items: center; gap: 0.5rem; font-size: 0.8rem; color: var(--muted); }
  .leg-dot { width: 12px; height: 12px; border-radius: 3px; }
  .dot-correct { background: var(--correct-border); }
  .dot-wrong   { background: var(--wrong-border); }
  .dot-empty   { background: var(--border); }

  .table-wrap { overflow-x: auto; width: 100%; max-width: 960px; }

  table { border-collapse: separate; border-spacing: 6px; width: 100%; }
  th, td { text-align: center; vertical-align: middle; }
  .corner { width: 60px; }

  .col-hdr, .row-hdr {
    background: var(--hdr-bg);
    border: 1.5px solid var(--accent);
    border-radius: 10px; padding: 12px 8px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 1.05rem; font-weight: 700;
    color: var(--accent); letter-spacing: 0.04em;
    min-width: 90px;
  }

  .total-hdr {
    background: var(--total-bg);
    border: 1.5px solid var(--accent2);
    border-radius: 10px; padding: 10px 8px;
    font-size: 0.72rem; font-weight: 600;
    color: var(--accent2); letter-spacing: 0.06em;
    text-transform: uppercase; min-width: 90px;
  }

  td.cell {
    background: var(--surface); border: 1.5px solid var(--border);
    border-radius: 10px; padding: 6px;
    transition: border-color 0.2s, background 0.2s; min-width: 90px;
  }

  td.total-cell {
    background: var(--total-bg); border: 1.5px solid #3a3560;
    border-radius: 10px; padding: 6px; min-width: 90px;
  }

  td.correct-cell { background: var(--correct-bg) !important; border-color: var(--correct-border) !important; }
  td.wrong-cell   { background: var(--wrong-bg)   !important; border-color: var(--wrong-border)   !important; }

  input.inp {
    width: 100%; border: none; background: transparent;
    color: var(--text); font-family: 'JetBrains Mono', monospace;
    font-size: 1rem; font-weight: 700; text-align: center;
    padding: 8px 4px; outline: none; border-radius: 6px;
    -moz-appearance: textfield;
  }

  input.inp::-webkit-outer-spin-button,
  input.inp::-webkit-inner-spin-button { -webkit-appearance: none; }
  input.inp:focus { background: rgba(124,106,247,0.08); }

  td.correct-cell input.inp { color: var(--correct-text); }
  td.wrong-cell   input.inp { color: var(--wrong-text); }

  .score-bar {
    margin-top: 1.8rem; display: flex; align-items: center;
    gap: 1.4rem; font-size: 0.85rem; color: var(--muted);
    flex-wrap: wrap; justify-content: center;
  }

  .score-num { font-family: 'JetBrains Mono', monospace; font-size: 1.1rem; font-weight: 700; }
  .score-correct { color: var(--correct-border); }
  .score-wrong   { color: var(--wrong-border); }

  .btn-row { display: flex; gap: 1rem; margin-top: 1.8rem; flex-wrap: wrap; justify-content: center; }

  .reset-btn, .back-btn {
    padding: 10px 28px; border-radius: 8px;
    font-family: 'Sora', sans-serif; font-size: 0.9rem; font-weight: 600;
    cursor: pointer; letter-spacing: 0.04em;
    transition: background 0.2s, color 0.2s, transform 0.15s;
  }

  .reset-btn { border: 1.5px solid var(--accent); background: transparent; color: var(--accent); }
  .reset-btn:hover { background: var(--accent); color: #fff; transform: translateY(-2px); }

  .back-btn { border: 1.5px solid var(--border); background: transparent; color: var(--muted); }
  .back-btn:hover { border-color: var(--muted); color: var(--text); transform: translateY(-2px); }

  @media (max-width: 600px) {
    .col-hdr, .row-hdr, td.cell, td.total-cell, .total-hdr { min-width: 68px; font-size: 0.85rem; }
    input.inp { font-size: 0.82rem; }
    .title-block h1 { font-size: 1.4rem; }
    .digit-btn { width: 74px; height: 74px; font-size: 1.6rem; }
  }
</style>
</head>
<body>

<!-- ══ SETUP SCREEN ══ -->
<div id="setup-screen">
  <div>
    <h1>Multiplication <span>Practice</span> Grid</h1>
    <p>Pehle batao — kitne digits ke numbers chahiye?</p>
  </div>

  <div class="digit-options">
    <button class="digit-btn" onclick="selectDigits(2, this)">2<span class="sub">digits</span></button>
    <button class="digit-btn" onclick="selectDigits(3, this)">3<span class="sub">digits</span></button>
    <button class="digit-btn" onclick="selectDigits(4, this)">4<span class="sub">digits</span></button>
    <button class="digit-btn" onclick="selectDigits(5, this)">5<span class="sub">digits</span></button>
  </div>

  <button class="start-btn" id="start-btn" onclick="startGame()" disabled>Shuru Karo →</button>
</div>

<!-- ══ GRID SCREEN ══ -->
<div id="grid-screen">
  <div class="title-block">
    <h1>Multiplication <span>Practice</span> Grid</h1>
    <p>Cell se bahar niklo — green = sahi &nbsp;|&nbsp; red = galat</p>
    <div class="badge" id="digit-badge"></div>
  </div>

  <div class="legend">
    <div class="leg-item"><div class="leg-dot dot-correct"></div>Sahi</div>
    <div class="leg-item"><div class="leg-dot dot-wrong"></div>Galat</div>
    <div class="leg-item"><div class="leg-dot dot-empty"></div>Khali</div>
  </div>

  <div class="table-wrap">
    <table id="grid"></table>
  </div>

  <div class="score-bar">
    <span>Sahi: <span class="score-num score-correct" id="sc">0</span></span>
    <span>Galat: <span class="score-num score-wrong" id="sw">0</span></span>
    <span>Bache: <span class="score-num" id="sr">0</span></span>
  </div>

  <div class="btn-row">
    <button class="reset-btn" onclick="resetAll()">🔀 Naye Numbers</button>
    <button class="back-btn" onclick="goBack()">← Digits Badlo</button>
  </div>
</div>

<script>
  let DIGITS = 3;
  let ROWS = [], COLS = [];

  function randN(d) {
    const min = Math.pow(10, d - 1);
    const max = Math.pow(10, d) - 1;
    return Math.floor(Math.random() * (max - min + 1)) + min;
  }

  function genNumbers(d) {
    const rows = [], cols = [];
    while (rows.length < 3) { const n = randN(d); if (!rows.includes(n)) rows.push(n); }
    while (cols.length < 3) { const n = randN(d); if (!cols.includes(n)) cols.push(n); }
    return { rows, cols };
  }

  function selectDigits(d, btn) {
    DIGITS = d;
    document.querySelectorAll('.digit-btn').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
    document.getElementById('start-btn').disabled = false;
  }

  function startGame() {
    const { rows, cols } = genNumbers(DIGITS);
    ROWS = rows; COLS = cols;
    buildTable();
    document.getElementById('setup-screen').style.display = 'none';
    document.getElementById('grid-screen').style.display = 'flex';
    document.getElementById('digit-badge').textContent = DIGITS + '-digit numbers';
    updateScore();
  }

  function goBack() {
    document.getElementById('grid-screen').style.display = 'none';
    document.getElementById('setup-screen').style.display = 'flex';
    document.querySelectorAll('.digit-btn').forEach(b => b.classList.remove('selected'));
    document.getElementById('start-btn').disabled = true;
  }

  function buildTable() {
    const table = document.getElementById('grid');
    table.innerHTML = '';

    let html = '<thead><tr><th class="corner"></th>';
    COLS.forEach(c => { html += `<th class="col-hdr">${c}</th>`; });
    html += '<th class="total-hdr">Row Total</th></tr></thead><tbody>';

    ROWS.forEach(r => {
      html += `<tr data-row="${r}"><th class="row-hdr">${r}</th>`;
      COLS.forEach(c => {
        html += `<td class="cell"><input class="inp" type="number" data-type="mul" data-col="${c}" /></td>`;
      });
      html += `<td class="total-cell"><input class="inp" type="number" data-type="rowtotal" data-row="${r}" /></td></tr>`;
    });

    html += '<tr><th class="total-hdr">Col Total</th>';
    COLS.forEach(c => {
      html += `<td class="total-cell"><input class="inp" type="number" data-type="coltotal" data-col="${c}" /></td>`;
    });
    html += '<td class="total-cell"><input class="inp" type="number" data-type="grandtotal" /></td></tr></tbody>';

    table.innerHTML = html;
    attachEvents();
  }

  function getCorrect(inp) {
    const type = inp.dataset.type;
    if (type === 'mul')       return parseInt(inp.closest('tr').dataset.row) * parseInt(inp.dataset.col);
    if (type === 'rowtotal')  return COLS.reduce((s, c) => s + parseInt(inp.dataset.row) * c, 0);
    if (type === 'coltotal')  return ROWS.reduce((s, r) => s + r * parseInt(inp.dataset.col), 0);
    if (type === 'grandtotal') return ROWS.reduce((s, r) => s + COLS.reduce((ss, c) => ss + r * c, 0), 0);
  }

  function updateScore() {
    let correct = 0, wrong = 0, empty = 0;
    document.querySelectorAll('#grid .inp').forEach(inp => {
      if (inp.value.trim() === '') { empty++; return; }
      const td = inp.parentElement;
      if (td.classList.contains('correct-cell')) correct++;
      else if (td.classList.contains('wrong-cell')) wrong++;
      else empty++;
    });
    document.getElementById('sc').textContent = correct;
    document.getElementById('sw').textContent = wrong;
    document.getElementById('sr').textContent = empty;
  }

  function attachEvents() {
    document.querySelectorAll('#grid .inp').forEach(inp => {
      inp.addEventListener('blur', () => {
        const td = inp.parentElement;
        const val = inp.value.trim();
        if (val === '') { td.classList.remove('correct-cell', 'wrong-cell'); updateScore(); return; }
        if (parseInt(val) === getCorrect(inp)) {
          td.classList.add('correct-cell'); td.classList.remove('wrong-cell');
        } else {
          td.classList.add('wrong-cell'); td.classList.remove('correct-cell');
        }
        updateScore();
      });
      inp.addEventListener('focus', () => {
        inp.parentElement.classList.remove('correct-cell', 'wrong-cell');
        updateScore();
      });
    });
  }

  function resetAll() {
    const { rows, cols } = genNumbers(DIGITS);
    ROWS = rows; COLS = cols;
    buildTable();
    updateScore();
  }
</script>
</body>
</html>
